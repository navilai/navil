version: "3.8"

services:
  honeypot-dev-tools:
    build:
      context: .
      dockerfile: Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=dev_tools
      - HONEYPOT_PORT=8080
    volumes:
      - honeypot-logs:/var/log/honeypot
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    tmpfs:
      - /tmp:size=50M
    networks:
      - honeypot-internal

  honeypot-cloud-creds:
    build:
      context: .
      dockerfile: Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=cloud_creds
      - HONEYPOT_PORT=8080
    volumes:
      - honeypot-logs:/var/log/honeypot
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    tmpfs:
      - /tmp:size=50M
    networks:
      - honeypot-internal

  honeypot-db-admin:
    build:
      context: .
      dockerfile: Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=db_admin
      - HONEYPOT_PORT=8080
    volumes:
      - honeypot-logs:/var/log/honeypot
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    tmpfs:
      - /tmp:size=50M
    networks:
      - honeypot-internal

volumes:
  honeypot-logs:

networks:
  honeypot-internal:
    internal: true
