version: "3.8"

services:
  honeypot-dev-tools:
    build:
      context: .
      dockerfile: Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=dev_tools
      - HONEYPOT_PORT=8080
    ports:
      - "9001:8080"
    volumes:
      - honeypot-logs:/var/log/honeypot
    restart: unless-stopped

  honeypot-cloud-creds:
    build:
      context: .
      dockerfile: Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=cloud_creds
      - HONEYPOT_PORT=8080
    ports:
      - "9002:8080"
    volumes:
      - honeypot-logs:/var/log/honeypot
    restart: unless-stopped

  honeypot-db-admin:
    build:
      context: .
      dockerfile: Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=db_admin
      - HONEYPOT_PORT=8080
    ports:
      - "9003:8080"
    volumes:
      - honeypot-logs:/var/log/honeypot
    restart: unless-stopped

volumes:
  honeypot-logs:
