name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check .
      - name: Check formatting with ruff
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Type check with mypy
        run: mypy navil/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run core tests with coverage
        run: pytest --cov=navil --cov-report=xml --cov-report=term-missing --ignore=tests/test_ml_features.py --ignore=tests/test_ml_isolation_forest.py --ignore=tests/test_ml_clustering.py
      - name: Check coverage threshold
        run: |
          coverage report --fail-under=80

  test-ml:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies (with ML)
        run: pip install -e ".[dev,ml]"
      - name: Run ML tests
        run: pytest tests/test_ml_features.py tests/test_ml_isolation_forest.py tests/test_ml_clustering.py -v
