- description: '[CVE-2025-53107] (CVSS 7.5, high) @cyanheads/git-mcp-server is an
    MCP server designed to interact with Git repositories. Prior to version 2.1.5,
    there is a command injection vulnerability caused by the unsanitized use of input
    parameters within a call to child_process.exec, enabling an attacker to inject
    arbitrary system commands. Successful exploitation can lead to remote code execution
    under the server process''s privileges. The server constructs and executes shell
    commands using unvalidated user input directly within command-line strings. This
    introduces the possibility of shell metacharacter injection (|, >, &&, etc.).
    An MCP Client can be instructed to execute additional actions for example via
    indirect prompt injection when asked to read git logs. This issue has been patched
    in version 2.1.5.'
  source: NIST NVD
  url: https://nvd.nist.gov/vuln/detail/CVE-2025-53107
  discovered_at: '2026-03-28T10:14:46.754770+00:00'
- description: "[CVE-2025-34072] (CVSS ?, medium) A data exfiltration vulnerability\
    \ exists in Anthropic\u2019s deprecated Slack Model Context Protocol (MCP) Server\
    \ via automatic link unfurling. When an AI agent using the Slack MCP Server processes\
    \ untrusted data, it can be manipulated to generate messages containing attacker-crafted\
    \ hyperlinks embedding sensitive data. Slack\u2019s link preview bots (e.g., Slack-LinkExpanding,\
    \ Slackbot, Slack-ImgProxy) will then issue outbound requests to the attacker-controlled\
    \ URL, resulting in zero-click exfiltration of private data."
  source: NIST NVD
  url: https://nvd.nist.gov/vuln/detail/CVE-2025-34072
  discovered_at: '2026-03-28T10:14:46.754770+00:00'
- description: '[CVE-2025-53365] (CVSS ?, medium) The MCP Python SDK, called `mcp`
    on PyPI, is a Python implementation of the Model Context Protocol (MCP). Prior
    to version 1.10.0, if a client deliberately triggers an exception after establishing
    a streamable HTTP session, this can lead to an uncaught ClosedResourceError on
