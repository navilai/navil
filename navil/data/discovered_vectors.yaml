    service. Impact may vary depending on the deployment conditions, and presence
    of infrastructure-level resilience measures. Version 1.10.0 contains a patch for
    the issue.'
  source: NIST NVD
  url: https://nvd.nist.gov/vuln/detail/CVE-2025-53365
  discovered_at: '2026-03-28T10:14:46.754770+00:00'
- description: "[CVE-2025-53372] (CVSS 7.5, high) node-code-sandbox-mcp is a Node.js\u2013\
    based Model Context Protocol server that spins up disposable Docker containers\
    \ to execute arbitrary JavaScript. Prior to 1.3.0, a command injection vulnerability\
    \ exists in the node-code-sandbox-mcp MCP Server. The vulnerability is caused\
    \ by the unsanitized use of input parameters within a call to child_process.execSync,\
    \ enabling an attacker to inject arbitrary system commands. Successful exploitation\
    \ can lead to remote code execution under the server process's privileges on the\
    \ host machine, bypassing the sandbox protection of running code inside docker.\
    \ This vulnerability is fixed in 1.3.0."
  source: NIST NVD
  url: https://nvd.nist.gov/vuln/detail/CVE-2025-53372
  discovered_at: '2026-03-28T10:14:46.754770+00:00'
