- description: "[CVE-2025-4143] (CVSS 6.1, medium) The OAuth implementation in workers-oauth-provider\
    \ that is part of  MCP framework https://github.com/cloudflare/workers-mcp , did\
    \ not correctly validate that redirect_uri was on the allowed list of redirect\
    \ URIs for the given client registration.\n\nFixed in:\_ https://github.com/cloudflare/workers-oauth-provider/pull/26\
    \ https://github.com/cloudflare/workers-oauth-provider/pull/26 \n\nImpact:\n\n\
    \ \n\nUnder certain circumstances (see below), if a victim had previously authorized\
    \ with a server built on workers-oath-provider, and an attacker could later trick\
    \ the victim into visiting a malicious web site, then attacker could potentially\
    \ steal the victim's credentials to the same OAuth server and subsequently impersonate\
    \ them.\n\nIn order for the attack to be possible, the OAuth server's authorized\
    \ callback must be designed to auto-approve authorizations that appear to come\
    \ from an OAuth client that the victim has authorized previously. The authorization\
    \ flow is not implemented by workers-oauth-provider; it is up to the application\
    \ built on top to decide whether to implement such automatic re-authorization.\
    \ However, many applications do implement such logic.\n\nNote: It is a basic,\
    \ well-known requirement that OAuth servers should verify that the redirect URI\
    \ is among the allowed list for the client, both during the authorization flow\
    \ and subsequently when exchanging the authorization code for an access token.\
    \ workers-oauth-provider implemented only the latter check, not the former. Unfortunately,\
    \ the former is the much more important check.\_Readers who are familiar with\
    \ OAuth may recognize that failing to check redirect URIs against the allowed\
    \ list is a well-known, basic mistake, covered extensively in the RFC and elsewhere.\
    \ The author of this library would like everyone to know that he was, in fact,\
    \ well-aware of this requirement, thought about it a lot while designing the library,\
    \ and then, somehow, forgot to actually make sure the check was in the code. That\
    \ is, it's not that he didn't know what he was doing, it's that he knew what he\
    \ was doing but flubbed it."
  source: NIST NVD
  url: https://nvd.nist.gov/vuln/detail/CVE-2025-4143
  discovered_at: '2026-03-28T10:14:46.754770+00:00'
- description: '[CVE-2025-47274] (CVSS ?, medium) ToolHive is a utility designed to
    simplify the deployment and management of Model Context Protocol (MCP) servers.
    Due to the ordering of code used to start an MCP server container, versions of
    ToolHive prior to 0.0.33 inadvertently store secrets in the run config files which
    are used to restart stopped containers. This means that an attacker who has access
    to the home folder of the user who starts the MCP server can read secrets without
    needing access to the secrets store itself. This only applies to secrets which
    were used in containers whose run configs exist at a point in time - other secrets
    remaining inaccessible. ToolHive 0.0.33 fixes the issue. Some workarounds are
    available. Stop and delete any running MCP servers, or manually remove any runconfigs
    from `$HOME/Library/Application Support/toolhive/runconfigs/` (macOS) or `$HOME/.state/toolhive/runconfigs/`
    (Linux).'
  source: NIST NVD
  url: https://nvd.nist.gov/vuln/detail/CVE-2025-47274
  discovered_at: '2026-03-28T10:14:46.754770+00:00'
