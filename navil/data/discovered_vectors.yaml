- description: "[CVE-2025-59417] (CVSS 6.1, medium) Lobe Chat is an open-source artificial\
    \ intelligence chat framework. Prior to version 1.129.4, there is a a cross-site\
    \ scripting (XSS) vulnerability when handling chat message in lobe-chat that can\
    \ be escalated to remote code execution on the user\u2019s machine. In lobe-chat,\
    \ when the response from the server is like <lobeArtifact identifier=\"ai-new-interpretation\"\
    \ ...> , it will be rendered with the lobeArtifact node, instead of the plain\
    \ text. However, when the type of the lobeArtifact is image/svg+xml , it will\
    \ be rendered as the SVGRender component, which internally uses dangerouslySetInnerHTML\
    \ to set the content of the svg, resulting in XSS attack. Any party capable of\
    \ injecting content into chat messages, such as hosting a malicious page for prompt\
    \ injection, operating a compromised MCP server, or leveraging tool integrations,\
    \ can exploit this vulnerability. This vulnerability is fixed in 1.129.4."
  source: NIST NVD
  url: https://nvd.nist.gov/vuln/detail/CVE-2025-59417
  discovered_at: '2026-03-28T10:14:46.754770+00:00'
- description: '[CVE-2025-59528] (CVSS 10.0, critical) Flowise is a drag & drop user
    interface to build a customized large language model flow. In version 3.0.5, Flowise
    is vulnerable to remote code execution. The CustomMCP node allows users to input
    configuration settings for connecting to an external MCP server. This node parses
    the user-provided mcpServerConfig string to build the MCP server configuration.
    However, during this process, it executes JavaScript code without any security
    validation. Specifically, inside the convertToValidJSONString function, user input
    is directly passed to the Function() constructor, which evaluates and executes
    the input as JavaScript code. Since this runs with full Node.js runtime privileges,
    it can access dangerous modules such as child_process and fs. This issue has been
    patched in version 3.0.6.'
  source: NIST NVD
  url: https://nvd.nist.gov/vuln/detail/CVE-2025-59528
  discovered_at: '2026-03-28T10:14:46.754770+00:00'
