  - category: model_supply_chain
    attack_name: LiteLLM PyPI Supply Chain Attack (TeamPCP Campaign)
    description: >
      Threat actor group "TeamPCP" compromised Trivy (an OSS security scanner used in
      LiteLLM's CI/CD pipeline) to steal maintainer PyPI credentials, then uploaded
      backdoored versions 1.82.7 and 1.82.8 of litellm (95M+ downloads/month). The
      payload is a .pth file that auto-executes on every Python process startup,
      performing credential harvesting (SSH keys, AWS/GCP tokens, .env files), Kubernetes
      lateral movement via privileged pod deployment, and installing a persistent systemd
      backdoor. A component called "hackerbot-claw" deployed an AI agent for automated
      attack targeting during the campaign itself — making this the first documented
      AI-assisted supply chain attack against AI infrastructure.
    detection_approach: >
      Monitor for unexpected .pth files in site-packages; alert on pip installs of
      litellm==1.82.7 or 1.82.8; detect outbound connections to unknown hosts from Python
      processes; scan CI/CD environments for Trivy binary tampering (hash mismatch);
      monitor for privileged Kubernetes pod creation not matching known deployment patterns.
    marker_2026: >
      Second-order supply chain attack (security scanner → CI credentials → PyPI);
      adversarial use of an AI agent (hackerbot-claw) within the attack itself; SNYK-PYTHON-LITELLM-15762713
      confirmed March 24, 2026 with packages live ~3 hours before quarantine.
    severity: critical
    cve: null
    sources:
      - "https://snyk.io/articles/poisoned-security-scanner-backdooring-litellm/"
      - "https://securitylabs.datadoghq.com/articles/litellm-compromised-pypi-teampcp-supply-chain-campaign/"

  - category: tool_schema_injection
    attack_name: MCP-ITP Implicit Tool Poisoning (Automated Framework)
    description: >
      MCP-ITP is an automated framework (arxiv:2601.07395) for implicit tool poisoning in
      which a malicious MCP tool stays dormant but manipulates the LLM into invoking a
      separate high-privilege legitimate tool to execute the attacker's objective. Using a
      black-box iterative optimization loop with evaluation and detection LLM feedback,
      the framework achieves 84.2% attack success rate at only 0.3% malicious detection rate
      across tested production MCP clients. The attack is stealthy precisely because the
      malicious tool never directly invokes harmful operations itself.
    detection_approach: >
      Instrument tool call sequences to detect cross-tool invocation chains that deviate
      from baseline user intent; flag cases where a tool call triggers invocations of
      unrelated high-privilege tools; use semantic similarity to detect tool descriptions
      that reference or imply other tools; log tool interaction graphs and alert on anomalous
      fan-out patterns.
    marker_2026: >
      First automated optimization framework for MCP tool poisoning achieving near-production
      success rates; published January 12, 2026 with empirical validation across real MCP clients;
      stealthy-by-design architecture makes signature-based detection ineffective.
    severity: high
    cve: null
    sources:
      - "https://arxiv.org/abs/2601.07395"

  - category: context_window_manipulation
    attack_name: n8n LLM Context Window as Exfiltration Channel (CVE-2026-21858 "Ni8mare")
    description: >
      A Content-Type confusion flaw in n8n's webhook handler allows an unauthenticated
      attacker to inject arbitrary local file paths into the agent's LLM context window
      via a crafted POST request (JSON body with a "files" array normally expected in
      multipart/form-data). The agent then reads and processes those files, and the attacker
      uses the chat interface to extract the contents — turning the LLM reasoning layer into
      an exfiltration channel. From leaked credentials, full RCE on the host is achievable.
      A public PoC exists on GitHub.
    detection_approach: >
      Alert on POST requests with application/json Content-Type to formWebhook endpoints
      containing a "files" field with filesystem paths; monitor for LLM responses containing
      credential-like patterns (private keys, API tokens, passwords); detect anomalous file
      reads triggered by webhook invocations; implement Content-Type validation in middleware
      before agent context injection.
    marker_2026: >
      Novel attack class — weaponizes the AI agent's LLM context window itself as an
      exfiltration channel rather than a direct data read; CVE-2026-21858 CVSS 10.0;
      actively exploitable with public PoC; fixed in n8n v1.121.0 (January 7, 2026).
    severity: critical
    cve: "CVE-2026-21858"
    sources:
      - "https://www.aikido.dev/blog/n8n-rce-vulnerability-cve-2026-21858"
      - "https://github.com/Chocapikk/CVE-2026-21858"

  - category: temporal_stateful
    attack_name: TOCTOU Race Condition Attacks on Browser-Use Agents
    description: >
      A new attack class (arxiv:2603.00476) exploiting time-of-check to time-of-use
      (TOCTOU) race conditions in LLM-powered browser agents. Attackers modify page
      content between an agent's planning phase (when it reads the page and commits to
      an action) and execution phase (when it performs the action). For example, an attacker
      swaps a legitimate form target for a malicious one after the agent has decided to
      submit but before it actually does. Evaluated across 10 popular open-source browser
      agents with high success rates.
    detection_approach: >
      Implement DOM snapshot hashing between plan and execution phases; reject action
      execution if page content has changed beyond a similarity threshold since planning;
      add integrity checks for action targets (URLs, form endpoints, button labels) at
      execution time; use browser isolation contexts that freeze the DOM state after
      the agent's planning observation.
    marker_2026: >
      First application of TOCTOU vulnerability class to LLM browser agents (arxiv:2603.00476,
      February 2026); entirely distinct from prompt injection — exploits agent reasoning
      pipeline timing, not text manipulation; no existing browser agent implements
      plan-to-execute DOM integrity verification.
    severity: high
    cve: null
    sources:
      - "https://arxiv.org/abs/2603.00476"

  - category: rag_memory_poisoning
    attack_name: MemoryGraft — Semantic Imitation Memory Poisoning
    description: >
      MemoryGraft exploits the "semantic imitation heuristic" used by agent memory systems —
      malicious entries are crafted to structurally resemble legitimate successful past
      experiences and are planted in the agent's long-term memory bank via innocuous-looking
      content (README files, documentation, public repositories). When the agent later
      retrieves memories for a semantically related task, it acts on the poisoned entry as
      if it were its own validated past preference. The MINJA variant requires no elevated
      privileges — the memory bank can be corrupted through normal conversational interaction.
      Unlike prompt injection, this attack is temporally decoupled: payload is planted today
      and activates weeks or months later.
    detection_approach: >
      Anomaly-score memory writes against baseline memory distributions; flag entries that
      contain action directives or imperatives (vs. descriptive factual memories); implement
      memory provenance tracking with source and context metadata; periodically re-validate
      high-influence memories against current task context; alert on memory entries that
      match semantic similarity to security-sensitive topics but were sourced from external
      content.
    marker_2026: >
      Now classified as OWASP ASI06 in the 2026 Top 10 for Agentic Applications; Microsoft
      Security Blog coverage February 10, 2026; creates persistent AI agent compromise with
      no binary artifact — invisible to traditional endpoint detection.
    severity: high
    cve: null
    sources:
      - "https://www.microsoft.com/en-us/security/blog/2026/02/10/ai-recommendation-poisoning/"
      - "https://www.penligent.ai/hackinglabs/agentic-ai-security-in-production-mcp-security-memory-poisoning-tool-misuse-and-the-new-execution-boundary/"

  - category: denial_of_service
    attack_name: Clawdrain — Tool-Chain Token Exhaustion (Economic DoS)
    description: >
      A trojanized AI skill (arxiv:2603.00902) exploits multi-turn tool-calling chains via
      a Segmented Verification Protocol to cause stealthy economic denial-of-service through
      token exhaustion. The malicious skill amplifies token consumption 6-9x by triggering
      autonomous tool composition chains where the agent itself discovers and chains tools
      to complete the attacker's verification requests — exceeding the attacker's initial
      design through emergent agent behavior. In production environments with Gemini 2.5 Pro,
      6-7x amplification was empirically confirmed; configurations with rich tool ecosystems
      achieved up to 9x.
    detection_approach: >
      Set per-session and per-tool token budgets with hard limits; monitor for anomalous
      tool call fan-out (single request triggering >N tool invocations); alert on requests
      that generate disproportionate token consumption relative to response value; implement
      cost-per-session rate limiting; track token amplification ratios and flag statistical
      outliers.
    marker_2026: >
      Emergent attack class — token exhaustion via agentic tool composition (not direct
      flooding); agents autonomously amplify the attack beyond attacker's initial design;
      arxiv:2603.00902 published March 1, 2026; no existing MCP security tooling monitors
      for this pattern.
    severity: medium
    cve: null
    sources:
      - "https://arxiv.org/abs/2603.00902"

  - category: model_supply_chain
    attack_name: ClawHavoc — AI Skills Marketplace Poisoning at Scale
    description: >
      The "ClawHavoc" campaign poisoned OpenClaw's ClawHub skills marketplace with at
      minimum 341 malicious skills (~12% of registry at peak, with some estimates at 1,184)
      using professionally documented, benign-sounding names (e.g., "solana-wallet-tracker")
      that installed AMOS (Atomic macOS Stealer) or keyloggers on execution. A separate
      vulnerability (March 16, 2026) allowed attackers to manipulate download-based rankings
      to push a malicious skill to the #1 position in its category, ensuring it was the first
      result developers found. CVE-2026-25253 enables operator-level AI gateway compromise
      via token exfiltration from skill execution context.
    detection_approach: >
      Audit skills before installation by inspecting tool descriptions for filesystem access,
      network calls, or subprocess invocations not consistent with stated purpose; verify
      skill publisher identity and creation date; sandbox skill execution in isolated
      environments before production deployment; monitor for anomalous network connections
      from newly installed skills; implement skill signature verification.
    marker_2026: >
      First AI skill marketplace poisoning campaign at scale (12-20% of marketplace);
      ranking manipulation exploit ensures maximum user exposure; CVE-2026-25253 token
      exfiltration component; OpenClaw shipped verified skill screening March 27, 2026
      in direct response.
    severity: critical
    cve: "CVE-2026-25253"
    sources:
      - "https://thehackernews.com/2026/02/researchers-find-341-malicious-clawhub.html"
      - "https://www.reco.ai/blog/openclaw-the-ai-agent-security-crisis-unfolding-right-now"

  - category: persistence
    attack_name: Promptware Kill Chain — Seven-Stage Agent Malware Framework
    description: >
      Schneier et al. (arxiv:2601.09625, revised February 2026) formally define "promptware"
      as a complete malware class triggered through engineered prompts, with a documented
      seven-stage kill chain: Initial Access (prompt injection) → Privilege Escalation
      (jailbreak) → Reconnaissance → Persistence (memory/RAG poisoning) → Command and
      Control → Lateral Movement → Actions on Objective. The paper documents 36 real-world
      incidents including the ChatGPT ZombAI campaign (Oct 2024) and the Reprompt attack
      (Jan 2026), establishing that multi-stage promptware is operationally deployed in
      production environments — not merely a research concern.
    detection_approach: >
      Map detection controls to each kill chain stage: log prompt injection attempts (Initial
      Access); alert on jailbreak patterns (Privilege Escalation); detect unusual tool
      enumeration (Reconnaissance); monitor memory writes for directive content (Persistence);
      identify periodic callback patterns (C2); track cross-agent invocation chains (Lateral
      Movement); correlate anomalous final-action outputs against expected task scope (Actions
      on Objective). Kill chain stage correlation significantly improves signal-to-noise.
    marker_2026: >
      First empirical evidence (36 documented incidents) that promptware operates as
      organized malware with full kill chain progression in production deployments; published
      with Bruce Schneier as co-author, signaling mainstream security community adoption
      of the threat model; OWASP and MITRE both updated agent threat frameworks in response.
    severity: high
    cve: null
    sources:
      - "https://arxiv.org/abs/2601.09625"
