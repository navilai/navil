# Alembic configuration for Navil Cloud
# https://alembic.sqlalchemy.org/

[alembic]
script_location = migrations
sqlalchemy.url = sqlite:///navil.db

# Override with DATABASE_URL env var in production:
#   DATABASE_URL=postgresql://user:pass@host/navil alembic upgrade head

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
