version: "3.8"

services:
  # ── Honeypot: Dev Tools (filesystem, shell, env access) ──
  honeypot-dev-tools:
    build:
      context: ../..
      dockerfile: deploy/honeypot-oci/Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=dev_tools
      - HONEYPOT_PORT=9001
      - NAVIL_CLOUD_API=https://navil-cloud-api.onrender.com
      - NAVIL_API_KEY=${NAVIL_API_KEY}
      - MACHINE_ID=honeypot-dev-tools-oci
    ports:
      - "9001:9001"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Honeypot: Cloud Credentials (AWS, GCP, Azure keys) ──
  honeypot-cloud-creds:
    build:
      context: ../..
      dockerfile: deploy/honeypot-oci/Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=cloud_creds
      - HONEYPOT_PORT=9002
      - NAVIL_CLOUD_API=https://navil-cloud-api.onrender.com
      - NAVIL_API_KEY=${NAVIL_API_KEY}
      - MACHINE_ID=honeypot-cloud-creds-oci
    ports:
      - "9002:9002"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Honeypot: DB Admin (SQL, schema, data export) ──
  honeypot-db-admin:
    build:
      context: ../..
      dockerfile: deploy/honeypot-oci/Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=db_admin
      - HONEYPOT_PORT=9003
      - NAVIL_CLOUD_API=https://navil-cloud-api.onrender.com
      - NAVIL_API_KEY=${NAVIL_API_KEY}
      - MACHINE_ID=honeypot-db-admin-oci
    ports:
      - "9003:9003"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Honeypot: OpenClaw Registry (skill marketplace, supply chain) ──
  # Targets: supply_chain, model_supply_chain
  honeypot-openclaw-registry:
    build:
      context: ../..
      dockerfile: deploy/honeypot-oci/Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=openclaw_registry
      - HONEYPOT_PORT=9004
      - NAVIL_CLOUD_API=https://navil-cloud-api.onrender.com
      - NAVIL_API_KEY=${NAVIL_API_KEY}
      - MACHINE_ID=honeypot-openclaw-registry-oci
    ports:
      - "9004:9004"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Honeypot: CI Pipeline (GitHub Actions runner, exposed secrets) ──
  # Targets: credential_access, code_execution
  honeypot-ci-pipeline:
    build:
      context: ../..
      dockerfile: deploy/honeypot-oci/Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=ci_pipeline
      - HONEYPOT_PORT=9005
      - NAVIL_CLOUD_API=https://navil-cloud-api.onrender.com
      - NAVIL_API_KEY=${NAVIL_API_KEY}
      - MACHINE_ID=honeypot-ci-pipeline-oci
    ports:
      - "9005:9005"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Honeypot: LLM Gateway (AI model gateway endpoint) ──
  # Targets: cognitive_exploitation, context_window_manipulation
  honeypot-llm-gateway:
    build:
      context: ../..
      dockerfile: deploy/honeypot-oci/Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=llm_gateway
      - HONEYPOT_PORT=9006
      - NAVIL_CLOUD_API=https://navil-cloud-api.onrender.com
      - NAVIL_API_KEY=${NAVIL_API_KEY}
      - MACHINE_ID=honeypot-llm-gateway-oci
    ports:
      - "9006:9006"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Honeypot: K8s Dashboard (Kubernetes admin panel) ──
  # Targets: cross_tenant_leakage, resource_hijacking
  honeypot-k8s-dashboard:
    build:
      context: ../..
      dockerfile: deploy/honeypot-oci/Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=k8s_dashboard
      - HONEYPOT_PORT=9007
      - NAVIL_CLOUD_API=https://navil-cloud-api.onrender.com
      - NAVIL_API_KEY=${NAVIL_API_KEY}
      - MACHINE_ID=honeypot-k8s-dashboard-oci
    ports:
      - "9007:9007"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Honeypot: RAG Endpoint (vector DB with retrieval API) ──
  # Targets: rag_memory_poisoning, feedback_loop_poisoning
  honeypot-rag-endpoint:
    build:
      context: ../..
      dockerfile: deploy/honeypot-oci/Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=rag_endpoint
      - HONEYPOT_PORT=9008
      - NAVIL_CLOUD_API=https://navil-cloud-api.onrender.com
      - NAVIL_API_KEY=${NAVIL_API_KEY}
      - MACHINE_ID=honeypot-rag-endpoint-oci
    ports:
      - "9008:9008"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Honeypot: OAuth Server (OAuth 2.1 provider with PKCE) ──
  # Targets: handshake_hijacking
  honeypot-oauth-server:
    build:
      context: ../..
      dockerfile: deploy/honeypot-oci/Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=oauth_server
      - HONEYPOT_PORT=9009
      - NAVIL_CLOUD_API=https://navil-cloud-api.onrender.com
      - NAVIL_API_KEY=${NAVIL_API_KEY}
      - MACHINE_ID=honeypot-oauth-server-oci
    ports:
      - "9009:9009"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Honeypot: Agent Marketplace (agent discovery registry) ──
  # Targets: agent_collusion, delegation_abuse
  honeypot-agent-marketplace:
    build:
      context: ../..
      dockerfile: deploy/honeypot-oci/Dockerfile.honeypot
    environment:
      - HONEYPOT_PROFILE=agent_marketplace
      - HONEYPOT_PORT=9010
      - NAVIL_CLOUD_API=https://navil-cloud-api.onrender.com
      - NAVIL_API_KEY=${NAVIL_API_KEY}
      - MACHINE_ID=honeypot-agent-marketplace-oci
    ports:
      - "9010:9010"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Cloudflare Tunnel (exposes all 10 honeypots) ──
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - honeypot-dev-tools
      - honeypot-cloud-creds
      - honeypot-db-admin
      - honeypot-openclaw-registry
      - honeypot-ci-pipeline
      - honeypot-llm-gateway
      - honeypot-k8s-dashboard
      - honeypot-rag-endpoint
      - honeypot-oauth-server
      - honeypot-agent-marketplace

  # ── Weekly crawl + scan (runs every Sunday 3am UTC) ──
  weekly-scan:
    build:
      context: ../..
      dockerfile: deploy/honeypot-oci/Dockerfile.scanner
    environment:
      - NAVIL_CLOUD_API=https://navil-cloud-api.onrender.com
      - NAVIL_API_KEY=${NAVIL_API_KEY}
    volumes:
      - scan-data:/data/scans
    entrypoint: ["crond", "-f", "-d", "8"]
    restart: unless-stopped

volumes:
  scan-data:
